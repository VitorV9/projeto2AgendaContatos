<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Contatos</title>
    <link rel="stylesheet" href="./css/main.css" />
</head>
<body>
    <header>
        <img src="./images/simboloTelefone.jpg" alt="Simbolo de telefone" />
        <h1>Lista de Contatos</h1>
    </header>
    <form>
        <input type="text" required placeholder="Nome do Contato" />
        <input type="tel" required placeholder="(DD) 90000-0000" />
        <button type="submit">Cadastrar+</button>
    </form>
    <table>
        <thead>
            <tr>
                <th>Nome do contato</th>
                <th>Número de telefone</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Vitor</td>
                <td>9971231231</td>
            </tr>
        </tbody>
        <tfoot>
        <tr>
            <td>Total de contatos</td>
            <td>15</td>
        </tr>
    </tfoot>
    </table>
</body>
</html>
