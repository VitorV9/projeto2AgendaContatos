<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Contatos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/main.css" />
</head>
<body>
    <div class="container">
        <header>
            <img src="./images/simboloTelefone.jpg" alt="Simbolo de telefone" />
            <h1>Agenda Telêfonica</h1>
        </header>
        <form id="form-agenda">
            <h2>Nome:</h2>
            <input id="nome-contato" type="text" required placeholder="Nome do Contato" />
            <h2>Número do contato:</h2>
            <input id="telefone-contato" type="tel" required placeholder="(DD) 90000-0000" />
            <button type="submit">Cadastrar+</button>
        </form>
        <table cellspacing="20">
            <thead>
                <tr>
                    <th>Nome do contato</th>
                    <th>Número de telefone</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
            <tfoot>
            <tr>
                <td>Total de contatos</td>
                <td>---</td>
            </tr>
        </tfoot>
        </table>
    </div>
    <script src="./js/main.js"></script>
</body>
</html>
